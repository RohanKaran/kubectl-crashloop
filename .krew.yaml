apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: crashloop
spec:
  version: {{ .TagName }}
  homepage: https://github.com/rohankaran/kubectl-crashloop
  shortDescription: Inspect pod crash history and previous logs
  description: |
    kubectl-crashloop correlates warning Events, last termination state,
    and previous logs into one report for a single pod.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      {{addURIAndSha "https://github.com/rohankaran/kubectl-crashloop/releases/download/{{ .TagName }}/kubectl-crashloop_darwin_amd64.tar.gz" .TagName | indent 6 }}
      files:
        - from: LICENSE
          to: .
        - from: kubectl-crashloop
          to: .
      bin: kubectl-crashloop
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      {{addURIAndSha "https://github.com/rohankaran/kubectl-crashloop/releases/download/{{ .TagName }}/kubectl-crashloop_darwin_arm64.tar.gz" .TagName | indent 6 }}
      files:
        - from: LICENSE
          to: .
        - from: kubectl-crashloop
          to: .
      bin: kubectl-crashloop
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      {{addURIAndSha "https://github.com/rohankaran/kubectl-crashloop/releases/download/{{ .TagName }}/kubectl-crashloop_linux_amd64.tar.gz" .TagName | indent 6 }}
      files:
        - from: LICENSE
          to: .
        - from: kubectl-crashloop
          to: .
      bin: kubectl-crashloop
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      {{addURIAndSha "https://github.com/rohankaran/kubectl-crashloop/releases/download/{{ .TagName }}/kubectl-crashloop_linux_arm64.tar.gz" .TagName | indent 6 }}
      files:
        - from: LICENSE
          to: .
        - from: kubectl-crashloop
          to: .
      bin: kubectl-crashloop
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      {{addURIAndSha "https://github.com/rohankaran/kubectl-crashloop/releases/download/{{ .TagName }}/kubectl-crashloop_windows_amd64.zip" .TagName | indent 6 }}
      files:
        - from: LICENSE
          to: .
        - from: kubectl-crashloop.exe
          to: .
      bin: kubectl-crashloop.exe
