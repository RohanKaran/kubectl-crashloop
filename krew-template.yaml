apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: crashloop
spec:
  version: "__VERSION__"
  homepage: "https://github.com/rohankaran/kubectl-crashloop"
  shortDescription: "Inspect pod crash history and previous logs"
  description: |
    kubectl-crashloop correlates warning Events, last termination state,
    and previous logs into one report for a single pod.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: "https://github.com/rohankaran/kubectl-crashloop/releases/download/__VERSION__/kubectl-crashloop_darwin_amd64.tar.gz"
      sha256: "__DARWIN_AMD64_SHA__"
      files:
        - from: "kubectl-crashloop"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "kubectl-crashloop"
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: "https://github.com/rohankaran/kubectl-crashloop/releases/download/__VERSION__/kubectl-crashloop_darwin_arm64.tar.gz"
      sha256: "__DARWIN_ARM64_SHA__"
      files:
        - from: "kubectl-crashloop"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "kubectl-crashloop"
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: "https://github.com/rohankaran/kubectl-crashloop/releases/download/__VERSION__/kubectl-crashloop_linux_amd64.tar.gz"
      sha256: "__LINUX_AMD64_SHA__"
      files:
        - from: "kubectl-crashloop"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "kubectl-crashloop"
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: "https://github.com/rohankaran/kubectl-crashloop/releases/download/__VERSION__/kubectl-crashloop_linux_arm64.tar.gz"
      sha256: "__LINUX_ARM64_SHA__"
      files:
        - from: "kubectl-crashloop"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "kubectl-crashloop"
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: "https://github.com/rohankaran/kubectl-crashloop/releases/download/__VERSION__/kubectl-crashloop_windows_amd64.zip"
      sha256: "__WINDOWS_AMD64_SHA__"
      files:
        - from: "kubectl-crashloop.exe"
          to: "."
        - from: "LICENSE"
          to: "."
      bin: "kubectl-crashloop.exe"
